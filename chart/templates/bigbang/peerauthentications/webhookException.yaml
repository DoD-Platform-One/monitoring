{{- $meshWorkloadsEnabled := dig "sidecar" "enabled" false .Values.istio }}
{{- if and .Values.istio.enabled $meshWorkloadsEnabled (eq .Values.istio.mtls.mode "STRICT") }}
# This is required to allow the kube API server to make requests against the 
# Prometheus operator to validate the installed webhooks
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: monitoring-webhook-exception
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: {{ .Values.istio.mtls.mode }}
  selector:
    matchLabels:
      app: kube-prometheus-stack-operator
  portLevelMtls:
    "10250":
      mode: PERMISSIVE
{{- end }}
