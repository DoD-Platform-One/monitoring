# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Monitoring snmp exporter peer auth exception gating
templates:
  - templates/bigbang/peerauthentications/snmpExporterException.yaml
release:
  name: test
values:
  - values/peerauth-exceptions.yaml
tests:
  - it: renders snmp exporter exception in strict mesh mode
    asserts:
      - hasDocuments:
          count: 1

  - it: does not render snmp exporter exception when disabled
    set:
      snmpExporter.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render snmp exporter exception when sidecar is disabled
    set:
      istio.sidecar.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render snmp exporter exception when mTLS is not strict
    set:
      istio.mtls.mode: PERMISSIVE
    asserts:
      - hasDocuments:
          count: 0
